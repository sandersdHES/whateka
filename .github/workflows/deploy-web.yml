name: Deploy Flutter Web to whateka.ch

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.5'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build Flutter Web
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
        run: |
          if [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_ANON_KEY" ]; then
            echo "::error::SUPABASE_URL and SUPABASE_ANON_KEY repository secrets must be set."
            exit 1
          fi
          flutter build web \
            --release \
            --base-href "/" \
            --dart-define=SUPABASE_URL="$SUPABASE_URL" \
            --dart-define=SUPABASE_ANON_KEY="$SUPABASE_ANON_KEY" \
            --dart-define=SENTRY_DSN="${SENTRY_DSN:-}"

      # Mettre à jour la date du sitemap à chaque déploiement
      - name: Update sitemap date
        run: |
          TODAY=$(date +%Y-%m-%d)
          sed -i "s|<lastmod>.*</lastmod>|<lastmod>${TODAY}</lastmod>|g" build/web/sitemap.xml
          echo "Sitemap updated with date: $TODAY"

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build/web
          cname: whateka.ch
          commit_message: "Deploy: ${{ github.event.head_commit.message }}"

      # Notifier Google du nouveau sitemap (ping)
      - name: Ping Google Search Console sitemap
        run: |
          curl -s "https://www.google.com/ping?sitemap=https://whateka.ch/sitemap.xml" || true
          echo "Google pinged about sitemap update"
